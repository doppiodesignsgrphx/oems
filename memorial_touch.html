<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Open+Sans:wght@300;400;500;600&display=swap');

  :root {
    --navy: #1D3968;
    --red: #B70C0C;
    --gold: #C9A84C;
    --gold-light: #E2C47A;
    --white: #F5F0E8;
    --black: #0A0A0A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden; background: var(--navy);
    font-family: 'Open Sans', sans-serif;
    cursor: none;
  }

  /* ===== BACKGROUND ===== */


  /* ===== HEADER ===== */
  .memorial-header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 48px 80px 36px;
    text-align: center;
    background: linear-gradient(180deg, rgba(10,10,20,0.98) 60%, transparent);
    z-index: 10;
  }
  .memorial-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; font-weight: 300;
    color: var(--white); line-height: 1; letter-spacing: 2px;
  }
  .memorial-title span { color: var(--gold); font-style: italic; }
  .memorial-sub {
    font-family: 'Open Sans', sans-serif; font-weight: 300;
    font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
    color: rgba(245,240,232,0.4); margin-top: 14px;
  }
  .divider-line {
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto 0;
  }

  /* ===== NAMES ===== */
  #names-container {
    position: absolute; left: 0; right: 0;
    top: 180px; bottom: 160px;
    overflow: hidden;
    cursor: grab;
    user-select: none;
  }
  #names-container.dragging { cursor: grabbing; }
  #names-track {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    will-change: transform;
    transform: translateY(0);
  }

  .name-entry {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }
  .name-entry .entry-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 400;
    color: var(--white); letter-spacing: 2px;
    text-transform: uppercase; text-align: center;
  }
  .name-entry .entry-meta {
    display: block;
    font-family: 'Open Sans', sans-serif; font-weight: 300;
    font-size: 20px; letter-spacing: 2px; text-transform: uppercase;
    color: #ffffff;
    margin-top: 4px; text-align: center;
  }

  /* ===== BOTTOM UI ===== */
  .count-badge {
    position: absolute; bottom: 40px; left: 48px;
    display: flex; flex-direction: column; align-items: flex-start;
    z-index: 20;
  }
  .count-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 300; color: var(--gold); line-height: 1;
  }
  .count-label {
    font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(245,240,232,0.3); margin-top: 4px;
  }

  .interact-hint {
    position: absolute; top: 36px; left: 48px;
    z-index: 20;
    display: flex; align-items: center; gap: 10px;
    font-family: 'Open Sans', sans-serif; font-weight: 300;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(201,168,76,0.6);
  }
  .interact-hint::before {
    content: '';
    width: 18px; height: 1px;
    background: rgba(201,168,76,0.4);
  }

  /* ===== TOUCH RIPPLE ===== */
  .ripple {
    position: fixed; border-radius: 50%;
    pointer-events: none; z-index: 9999;
    background: radial-gradient(circle, rgba(201,168,76,0.4) 0%, transparent 70%);
    animation: rippleAnim 0.6s ease-out forwards;
  }
  @keyframes rippleAnim {
    from { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%) scale(0); }
    to   { width: 120px; height: 120px; opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }
</style>

// ===== BUILD NAMES — single copy only =====
function buildNames() {
  const track = document.getElementById('names-track');
  NAMES.forEach(entry => {
    const el = document.createElement('div');
    el.className = 'name-entry';
    el.innerHTML = `
      <span class="entry-name">${entry.name}</span>
      <span class="entry-meta">${entry.agency} &bull; ${entry.date}</span>
    `;
    track.appendChild(el);
  });
}
buildNames();



// ===== RAF SCROLL + DRAG =====
(function() {
  const container = document.getElementById('names-container');
  const track = document.getElementById('names-track');

  // Pixels per second scroll speed
  const SPEED = 70;

  let y = 0;
  let lastTime = null;
  let dragging = false;
  let dragStartY = 0;
  let dragStartPos = 0;
  let paused = false;

  function getTrackHeight() { return track.scrollHeight; }
  function getContainerHeight() { return container.clientHeight; }

  function tick(ts) {
    if (!lastTime) lastTime = ts;
    const dt = (ts - lastTime) / 1000;
    lastTime = ts;

    if (!dragging && !paused) {
      y += SPEED * dt;
      // Seamless loop — when we've scrolled past all entries, reset
      const maxY = getTrackHeight() - getContainerHeight();
      if (y >= maxY) y = 0;
      track.style.transform = `translateY(${-y}px)`;
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Drag
  function startDrag(clientY) {
    dragging = true;
    paused = true;
    dragStartY = clientY;
    dragStartPos = y;
    container.classList.add('dragging');
  }
  function moveDrag(clientY) {
    if (!dragging) return;
    const delta = dragStartY - clientY;
    const maxY = getTrackHeight() - getContainerHeight();
    y = Math.max(0, Math.min(maxY, dragStartPos + delta));
    track.style.transform = `translateY(${-y}px)`;
  }
  function endDrag() {
    if (!dragging) return;
    dragging = false;
    paused = false;
    lastTime = null;
    container.classList.remove('dragging');
  }

  container.addEventListener('touchstart', e => startDrag(e.touches[0].clientY), { passive: true });
  container.addEventListener('touchmove',  e => { moveDrag(e.touches[0].clientY); e.preventDefault(); }, { passive: false });
  container.addEventListener('touchend',   () => endDrag());
  container.addEventListener('mousedown',  e => startDrag(e.clientY));
  window.addEventListener('mousemove',     e => { if (dragging) moveDrag(e.clientY); });
  window.addEventListener('mouseup',       () => { if (dragging) endDrag(); });
})();

// ===== TOUCH RIPPLE =====
document.addEventListener('click', function(e) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
});
