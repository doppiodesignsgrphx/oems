<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Background</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }

  

    #prompt.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <video
    id="bgVideo"
    src="https://oems.nc.gov/wp-content/uploads/2026/05/Video-Background-banquet.mp4"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  ></video>


</body>
</html>
